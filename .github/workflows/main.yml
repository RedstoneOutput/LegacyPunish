name: Java CI with Maven
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 8
      uses: actions/setup-java@v2
      with:
        java-version: '8'
        distribution: 'adopt'
    - name: Build with Maven
      run: mvn package
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: LegacyPunish-Jar
        path: target/*.jar
